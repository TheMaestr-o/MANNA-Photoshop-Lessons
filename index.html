<!DOCTYPE html>

<html>
<head>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app">

        <!-- Top bar: day navigation -->
        <div class="navbar">
            <div class="nav-btn" id="prev" title="Previous day" role="button" tabindex="-1">‹</div>
            <div class="nav-center" id="nav-center" role="button" tabindex="-1" title="Jump to today">
                <div class="nav-date" id="nav-date">—</div>
                <div class="nav-sub" id="nav-sub"></div>
            </div>
            <div class="mode-btn" id="mode-toggle" title="Switch mode" role="button" tabindex="-1">CARDS</div>
            <div class="swap-btn" id="swap-lang" title="Swap top/bottom languages" role="button" tabindex="-1">⇅</div>
            <div class="nav-btn" id="next" title="Next day" role="button" tabindex="-1">›</div>
        </div>

        <!-- Language segmented control -->
        <div class="langbar" id="langbar">
            <div class="lang-opt" data-lang="de" role="button" tabindex="-1">DE</div>
            <div class="lang-opt" data-lang="en" role="button" tabindex="-1">EN</div>
            <div class="lang-opt" data-lang="ru" role="button" tabindex="-1">RU</div>
        </div>
        <div class="langbar langbar-alt hidden" id="langbar-alt">
            <div class="lang-opt lang2-opt" data-lang="de" role="button" tabindex="-1">DE</div>
            <div class="lang-opt lang2-opt" data-lang="en" role="button" tabindex="-1">EN</div>
            <div class="lang-opt lang2-opt" data-lang="ru" role="button" tabindex="-1">RU</div>
        </div>

        <!-- Scrollable content -->
        <div class="scroll" id="scroll">
            <div id="content"></div>
            <div class="foot" id="foot"></div>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
